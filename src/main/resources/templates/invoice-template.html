<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8" />
    <style>
        body {
            font-family: 'DejaVu Sans', sans-serif;
            font-size: 14px;
            color: #333333;
            padding: 30px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .company-info, .invoice-summary {
            margin-bottom: 20px;
        }

        .company-info p, .invoice-summary p {
            margin: 4px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #cccccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        tfoot td {
            font-weight: bold;
        }

        .total {
            text-align: right;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>HÓA ĐƠN GIÁ TRỊ GIA TĂNG</h1>

<div class="company-info">
    <p><strong>Tên công ty:</strong> <span th:text="${companyName}">TASTEFLOW</span></p>
    <p><strong>Mã số thuế:</strong> <span th:text="${taxCode}">MAN74493</span></p>
    <p><strong>Email nhận hóa đơn:</strong> <span th:text="${email}">example@gmail.com</span></p>
    <p><strong>Địa chỉ:</strong> <span th:text="${address}">Đà Nẵng</span></p>
</div>

<table>
    <thead>
    <tr>
        <th>Sản phẩm</th>
        <th>Đơn vị</th>
        <th>Số lượng</th>
        <th>Giá</th>
        <th>Thành tiền</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}">
        <td th:text="${item.product.name}">Sản phẩm A</td>
        <td th:text="${item.productUnit.unit.name}">Hộp</td>
        <td th:text="${item.quantity}">2</td>
        <td th:text="${#numbers.formatDecimal(item.price / item.quantity, 1, 'COMMA', 0, 'POINT')} + '₫'">20.000₫</td>
        <td th:text="${#numbers.formatDecimal(item.price, 1, 'COMMA', 0, 'POINT')} + '₫'">40.000₫</td>
    </tr>
    </tbody>
</table>

<div class="total">
    Tổng cộng: <span th:text="${#numbers.formatDecimal(totalPrice, 1, 'COMMA', 0, 'POINT')} + '₫'">185.800₫</span>
</div>

</body>
</html>
